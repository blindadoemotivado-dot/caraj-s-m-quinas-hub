<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Sem conexão — Carajás Máquinas</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0D0D0D" />
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0D0D0D;color:#fff;font-family:Inter,system-ui,-apple-system,sans-serif;padding:24px;text-align:center}
  .card{max-width:420px}
  .logo{display:inline-block;background:#F5C200;color:#0D0D0D;font-weight:900;letter-spacing:.5px;padding:8px 14px;border-radius:8px;font-size:14px;margin-bottom:24px}
  h1{font-size:26px;margin:0 0 10px;font-weight:900}
  p{color:rgba(255,255,255,.7);font-size:15px;line-height:1.5;margin:0 0 24px}
  button{background:#F5C200;color:#0D0D0D;border:0;border-radius:8px;padding:14px 22px;font-weight:800;font-size:15px;cursor:pointer;width:100%}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">CARAJÁS</div>
    <h1>Você está offline</h1>
    <p>Não foi possível carregar esta página. Verifique sua conexão com a internet e tente novamente.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
